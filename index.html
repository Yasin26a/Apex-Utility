            if (typeof globalThis !== 'undefined' && globalThis !== window) {
              Object.defineProperty(globalThis, 'fetch', {
                get: function() { return fetchStore; },
                set: function(val) { fetchStore = val; },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e3) {
            // Ignore
          }
        } catch (e) {
          console.warn('[Compatibility] Setup failed:', e);
        }
