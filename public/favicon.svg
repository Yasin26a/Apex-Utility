<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" width="100%" height="100%">
  <defs>
    <!-- Intense Cyber Gold/Yellow Gradient for the Lightning Bolt -->
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="40%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>

    <!-- Glowing backdrop shadow for high contrast on both dark and light browser tabs -->
    <filter id="lightningGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Central Premium Lightning Bolt -->
  <g filter="url(#lightningGlow)">
    <path
      d="M312 30 L120 270 H250 L170 482 L392 242 H262 Z"
      fill="url(#lightningGrad)"
    />
  </g>
</svg>
